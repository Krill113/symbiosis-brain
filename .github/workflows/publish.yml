name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(uvx hatch version)
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi

      - name: Build wheel and sdist
        run: uv build

      - name: Smoke-test wheel import
        run: uv run --isolated --no-project --with dist/*.whl -- python -c "import symbiosis_brain; print(symbiosis_brain.__version__)"

      - name: Smoke-test sdist import
        run: uv run --isolated --no-project --with dist/*.tar.gz -- python -c "import symbiosis_brain; print(symbiosis_brain.__version__)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/symbiosis-brain
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  verify:
    name: Verify PyPI install
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Install from PyPI with retry
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          for i in 1 2 3 4 5 6; do
            if uv run --isolated --no-project --refresh-package symbiosis-brain --with "symbiosis-brain==${TAG_VERSION}" -- python -c "import symbiosis_brain; print(symbiosis_brain.__version__)"; then
              echo "Install + import succeeded on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed; sleeping 30s"
            sleep 30
          done
          echo "::error::Failed to install symbiosis-brain==${TAG_VERSION} from PyPI after 6 attempts"
          exit 1
